<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1625"/>
      <stop offset="100%" stop-color="#0f0d17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0a030"/>
      <stop offset="100%" stop-color="#e08820"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ac5b6"/>
      <stop offset="100%" stop-color="#2da89b"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Speech bubble -->
  <path d="M30 32 h68 a12 12 0 0 1 12 12 v36 a12 12 0 0 1-12 12 H72 l-12 14 -4-14 H30 a12 12 0 0 1-12-12 V44 a12 12 0 0 1 12-12z" fill="url(#accent)" opacity="0.9"/>

  <!-- Microphone body -->
  <rect x="56" y="42" width="16" height="28" rx="8" ry="8" fill="url(#bg)"/>

  <!-- Mic stand arc -->
  <path d="M48 62 a16 16 0 0 0 32 0" fill="none" stroke="#1a1625" stroke-width="3" stroke-linecap="round"/>

  <!-- Mic stand line -->
  <line x1="64" y1="78" x2="64" y2="84" stroke="#1a1625" stroke-width="3" stroke-linecap="round"/>

  <!-- Mic base -->
  <line x1="58" y1="84" x2="70" y2="84" stroke="#1a1625" stroke-width="3" stroke-linecap="round"/>

  <!-- Sound waves -->
  <path d="M40 50 a4 8 0 0 0 0 16" fill="none" stroke="url(#teal)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M34 46 a6 14 0 0 0 0 24" fill="none" stroke="url(#teal)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M88 50 a-4 8 0 0 1 0 16" fill="none" stroke="url(#teal)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M94 46 a-6 14 0 0 1 0 24" fill="none" stroke="url(#teal)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
