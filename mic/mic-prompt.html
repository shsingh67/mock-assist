<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Assist — Microphone Access</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      padding: 32px;
      max-width: 320px;
    }
    h2 {
      color: #e94560;
      margin-bottom: 12px;
      font-size: 18px;
    }
    p {
      color: #8892a4;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .status {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 12px;
    }
    .status.waiting {
      background: rgba(255,255,255,0.05);
      color: #8892a4;
    }
    .status.granted {
      background: rgba(76, 175, 80, 0.15);
      color: #81c784;
    }
    .status.denied {
      background: rgba(233, 69, 96, 0.15);
      color: #ff6b81;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Microphone Access</h2>
    <p>Mock Assist needs microphone permission for speech-to-text during interviews.</p>
    <div id="status" class="status waiting">Requesting access...</div>
  </div>
  <script src="mic-prompt.js"></script>
</body>
</html>
